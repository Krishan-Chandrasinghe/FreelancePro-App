name: CI/CD Pipeline

on:
  push:
    tags:
      - 'v*' # v1.0, v1.1 වගේ tag එකක් push කරපු ගමන් මේක වැඩ කරනවා

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Server image tag making
      - name: Extract Metadata for Server
        id: meta-server
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/freelancerpro-server
          tags: |
            type=semver,pattern={{version}}
            type=raw,value=latest

      # Build & push server image
      - name: Build and Push Server
        uses: docker/build-push-action@v5
        with:
          context: ./server
          push: true
          tags: ${{ steps.meta-server.outputs.tags }}

      # Client image tags making
      - name: Extract Metadata for Client
        id: meta-client
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/freelancerpro-client
          tags: |
            type=semver,pattern={{version}}
            type=raw,value=latest

      # Build & push Client image
      - name: Build and Push Client
        uses: docker/build-push-action@v5
        with:
          context: ./client
          push: true
          build-args: |
            NEXT_PUBLIC_API_URL=${{ secrets.NEXT_PUBLIC_API_URL }}
          tags: ${{ steps.meta-client.outputs.tags }}

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd ~/Mega-App

            echo "MONGO_USER=${{ secrets.MONGO_USER }}" > .env
            echo "MONGO_PASS=${{ secrets.MONGO_PASS }}" >> .env
            echo "DOCKER_USER=${{ secrets.DOCKERHUB_USERNAME }}" >> .env

            sudo docker compose pull
            sudo docker compose up -d --remove-orphans
            sudo docker image prune -f