name: CI/CD Pipeline

on:
  push:
    tags:
      - 'v*' # v1.0, v1.1 වගේ tag එකක් push කරපු ගමන් මේක වැඩ කරනවා

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Server image tag making
      - name: Extract Metadata for Server
        id: meta-server
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/freelancerpro-server
          tags: |
            type=semver,pattern={{version}}
            type=raw,value=latest

      # Build & push server image
      - name: Build and Push Server
        uses: docker/build-push-action@v5
        with:
          context: ./server
          push: true
          tags: ${{ steps.meta-server.outputs.tags }}

      # Client image tags making
      - name: Extract Metadata for Client
        id: meta-client
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/freelancerpro-client
          tags: |
            type=semver,pattern={{version}}
            type=raw,value=latest

      # Build & push Client image
      - name: Build and Push Client
        uses: docker/build-push-action@v5
        with:
          context: ./client
          push: true
          build-args: |
            NEXT_PUBLIC_API_URL=${{ secrets.NEXT_PUBLIC_API_URL }}
          tags: ${{ steps.meta-client.outputs.tags }}

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.AWS_HOST }}
          username: ${{ secrets.AWS_USER }}
          key: ${{ secrets.AWS_SSH_KEY }}
          script: |
            cd ~/Mega-App

            echo "PORT=${{ secrets.PORT }}" > .env
            echo "CLIENT_URL=${{ secrets.CLIENT_URL }}" >> .env
            echo "MONGO_INITDB_ROOT_USERNAME=${{ secrets.MONGO_INITDB_ROOT_USERNAME }}" >> .env
            echo "MONGO_INITDB_ROOT_PASSWORD=${{ secrets.MONGO_INITDB_ROOT_PASSWORD }}" >> .env
            echo "JWT_SECRET=${{ secrets.JWT_SECRET }}" >> .env
            echo "JWT_EXPIRE=${{ secrets.JWT_EXPIRE }}" >> .env
            echo "CLOUDINARY_CLOUD_NAME=${{ secrets.CLOUDINARY_CLOUD_NAME }}" >> .env
            echo "CLOUDINARY_API_KEY=${{ secrets.CLOUDINARY_API_KEY }}" >> .env
            echo "CLOUDINARY_API_SECRET=${{ secrets.CLOUDINARY_API_SECRET }}" >> .env
            echo "CLOUDINARY_URL=${{ secrets.CLOUDINARY_URL }}" >> .env
            echo "NEXT_PUBLIC_API_URL=${{ secrets.NEXT_PUBLIC_API_URL }}" >> .env

            echo "
            services:
              mongo:
                image: mongo:latest
                environment:
                  - MONGO_INITDB_ROOT_USERNAME=${MONGO_INITDB_ROOT_USERNAME}
                  - MONGO_INITDB_ROOT_PASSWORD=${MONGO_INITDB_ROOT_PASSWORD}
                networks:
                  - db_server_ex
                restart: always
                volumes:
                  - freelancerpro_data:/data/db

              mongo-express:
                image: mongo-express:latest
                environment:
                  - ME_CONFIG_MONGODB_ADMINUSERNAME=${MONGO_INITDB_ROOT_USERNAME}
                  - ME_CONFIG_MONGODB_ADMINPASSWORD=${MONGO_INITDB_ROOT_PASSWORD}
                  - ME_CONFIG_MONGODB_SERVER=mongo
                ports:
                  - 8081:8081
                depends_on:
                  - mongo
                restart: always
                networks:
                  - db_server_ex
                
              server:
                image: krishanchandrasinghe/freelancerpro-server
                environment:
                  - PORT=${PORT}
                  - CLIENT_URL=${CLIENT_URL}
                  - MONGO_URI=mongodb://${MONGO_INITDB_ROOT_USERNAME}:${MONGO_INITDB_ROOT_PASSWORD}@mongo:27017/portfolio?authSource=admin
                  - JWT_SECRET=${JWT_SECRET}
                  - JWT_EXPIRE=${JWT_EXPIRE}
                  - CLOUDINARY_CLOUD_NAME=${CLOUDINARY_CLOUD_NAME}
                  - CLOUDINARY_API_KEY=${CLOUDINARY_API_KEY}
                  - CLOUDINARY_API_SECRET=${CLOUDINARY_API_SECRET}
                  - CLOUDINARY_URL=cloudinary://${CLOUDINARY_API_KEY}:${CLOUDINARY_API_SECRET}@${CLOUDINARY_CLOUD_NAME}
                restart: always
                networks:
                  - db_server_ex
                  - client_server
                depends_on:
                  - mongo

              client:
                image: krishanchandrasinghe/freelancerpro-client
                ports:
                  - 80:80
                depends_on:
                  - server
                restart: always
                networks:
                  - client_server

            networks:
              db_server_ex:
                driver: bridge
              client_server:
                driver: bridge

            volumes:
              freelancerpro_data:
            
            " > compose.yaml

            sudo docker-compose pull
            sudo docker-compose up -d --remove-orphans
            sudo docker image prune -f